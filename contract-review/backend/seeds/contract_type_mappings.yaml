# ============================================================================
# contract_type_mappings.yaml — Two seed tables in one file:
#
#   contract_type_req_mapping        (mandatory/optional + quality thresholds)
#   contract_type_framework_weights  (framework relevance weights per type)
#
# Weights in contract_type_framework_weights are renormalized to sum=1.0
# at query time — raw values here express relative importance, not absolute %.
#
# min_quality_score: minimum clause quality (0.000–1.000) for a finding to be
#   classified as 'present' rather than 'partial'.
# weight: relative importance of this sub-requirement within the framework score.
# ============================================================================


# ----------------------------------------------------------------------------
# contract_type_framework_weights
# Which frameworks apply to each contract type, and with what relative weight.
# ----------------------------------------------------------------------------

contract_type_framework_weights:

  # SaaS — all four frameworks apply; GDPR and ISO 27001 dominate
  - contract_type: saas
    framework_id: iso27001
    weight: 0.350

  - contract_type: saas
    framework_id: gdpr
    weight: 0.350

  - contract_type: saas
    framework_id: nis2
    weight: 0.150

  - contract_type: saas
    framework_id: dora
    weight: 0.150

  # DPA — GDPR is primary; ISO 27001 security measures support it
  - contract_type: dpa
    framework_id: gdpr
    weight: 0.700

  - contract_type: dpa
    framework_id: iso27001
    weight: 0.300

  # Cloud IaaS/PaaS — DORA (for financial sector) and ISO 27001 dominate
  - contract_type: cloud_iaas_paas
    framework_id: dora
    weight: 0.400

  - contract_type: cloud_iaas_paas
    framework_id: iso27001
    weight: 0.350

  - contract_type: cloud_iaas_paas
    framework_id: gdpr
    weight: 0.250

  # Managed Security — ISO 27001 is primary; DORA applies for financial entities
  - contract_type: managed_security
    framework_id: iso27001
    weight: 0.500

  - contract_type: managed_security
    framework_id: dora
    weight: 0.300

  - contract_type: managed_security
    framework_id: nis2
    weight: 0.200

  # Outsourcing — DORA (if financial sector) and ISO 27001 apply equally
  - contract_type: outsourcing
    framework_id: dora
    weight: 0.450

  - contract_type: outsourcing
    framework_id: iso27001
    weight: 0.350

  - contract_type: outsourcing
    framework_id: gdpr
    weight: 0.200

  # Professional Services — ISO 27001 primary; GDPR if data processing involved
  - contract_type: professional_svcs
    framework_id: iso27001
    weight: 0.600

  - contract_type: professional_svcs
    framework_id: gdpr
    weight: 0.400

  # Software License — lightweight; ISO 27001 baseline
  - contract_type: software_license
    framework_id: iso27001
    weight: 0.700

  - contract_type: software_license
    framework_id: gdpr
    weight: 0.300

  # NDA — minimal framework requirements; basic ISO 27001 confidentiality controls
  - contract_type: nda
    framework_id: iso27001
    weight: 1.000


